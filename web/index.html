<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-claw | Mission Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=MonoLisa:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Main Chat Area -->
        <main class="glass-panel main-panel">
            <header class="panel-header">
                <h2>Terminal feed</h2>
                <button id="kill-btn" style="background: rgba(239, 68, 68, 0.2); border: 1px solid var(--error); color: #fca5a5;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
                    Kill Task
                </button>
            </header>
            
            <div class="chat-container" id="chat-box">
                <!-- System intro message -->
                <div class="message system">
                    <div><strong>Anti-claw Local Engine</strong> v2.7.0</div>
                    <div>Agent initialized and listening for commands.</div>
                </div>
            </div>

            <form class="input-area" id="chat-form">
                <div class="input-container">
                    <input type="text" id="prompt-input" placeholder="Give me a task..." autocomplete="off">
                    <button type="submit">
                        Execute
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </form>
        </main>

        <!-- Right Control Panel -->
        <aside class="glass-panel control-panel">
            <header class="panel-header">
                <h2>Control Center</h2>
            </header>
            
            <div class="panel-content">
                <!-- Status Cards -->
                <div class="status-card">
                    <div class="status-row">
                        <span class="label">Proxy Engine</span>
                        <div class="status-indicator">
                            <span class="dot green pulse" id="proxy-dot"></span>
                            <span id="proxy-status">Check</span>
                        </div>
                    </div>
                </div>

                <div class="status-card">
                    <div class="status-row">
                        <span class="label">Daemon Process</span>
                        <div class="status-indicator">
                            <span class="dot green pulse" id="daemon-dot"></span>
                            <span id="daemon-status">Online</span>
                        </div>
                    </div>
                    <div class="status-row">
                        <span class="label">Active Tasks</span>
                        <span id="active-tasks">0</span>
                    </div>
                    <div class="status-row">
                        <span class="label">Memories</span>
                        <span id="memories-count">0</span>
                    </div>
                </div>

                <!-- Model Selection -->
                <div class="status-card">
                    <div class="status-row" style="margin-bottom: 0.5rem;">
                        <span class="label">Active Model</span>
                    </div>
                    <div class="select-wrapper">
                        <select id="model-select">
                            <option value="">Loading models...</option>
                        </select>
                    </div>
                </div>
                
                <div class="status-card" style="margin-top: auto;">
                     <div class="status-row">
                         <span class="label" style="font-size: 0.75rem; text-align: center; width: 100%;">Local workspace isolated.</span>
                     </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Simple Markdown Render Script -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
